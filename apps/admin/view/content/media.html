{include file='common/head.html'}
<!-- CSRF token（POST 請求需要） -->
<input type="hidden" name="formcheck" id="formcheck" value="{$formcheck}">
<style>
.media-toolbar { display: flex; gap: 15px; padding: 12px 15px; background: #fafafa; border-bottom: 1px solid #eee; align-items: center; flex-wrap: wrap; }
.media-toolbar .stat { font-size: 13px; color: #666; }
.media-toolbar .stat b { font-size: 16px; margin: 0 2px; }
.stat-total b { color: #1E9FFF; }
.stat-used b { color: #5FB878; }
.stat-unused b { color: #FF5722; }
.stat-marked b { color: #FFB800; }
.media-toolbar .toolbar-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.filter-bar { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.filter-bar .layui-btn { margin: 0; }
.filter-bar .active { background: #1E9FFF !important; color: #fff !important; border-color: #1E9FFF !important; }
.search-input { width: 200px; height: 30px; border: 1px solid #e6e6e6; border-radius: 2px; padding: 0 10px; font-size: 13px; outline: none; transition: border-color .2s; }
.search-input:focus { border-color: #1E9FFF; }

.media-grid { display: flex; flex-wrap: wrap; gap: 12px; padding: 15px; min-height: 200px; position: relative; }
.media-grid.loading::after { content: ''; position: absolute; top: 50%; left: 50%; width: 32px; height: 32px; margin: -16px 0 0 -16px; border: 3px solid #e6e6e6; border-top-color: #1E9FFF; border-radius: 50%; animation: spin .6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.media-empty { width: 100%; text-align: center; padding: 60px 0; color: #999; font-size: 14px; }

.media-item { width: 148px; border: 2px solid #e6e6e6; border-radius: 6px; overflow: hidden; position: relative; cursor: default; transition: all .2s; background: #fff; }
.media-item:hover { border-color: #1E9FFF; box-shadow: 0 2px 8px rgba(30,159,255,.15); }
.media-item.is-used { border-color: #5FB878; }
.media-item.is-marked { border-color: #FFB800; }
.media-item.is-unused { border-color: #FF5722; }

.media-thumb { width: 100%; height: 110px; overflow: hidden; background: #f5f5f5; display: flex; align-items: center; justify-content: center; position: relative; }
.media-thumb img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; }
.media-thumb .file-icon { font-size: 36px; color: #bbb; }

.media-info { padding: 6px 8px; }
.media-info .name { font-size: 11px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 16px; }
.media-info .meta { font-size: 10px; color: #999; line-height: 14px; margin-top: 2px; }

.media-badge { position: absolute; top: 5px; right: 5px; font-size: 10px; padding: 1px 6px; border-radius: 3px; color: #fff; line-height: 16px; }
.badge-used { background: #5FB878; }
.badge-unused { background: #FF5722; }
.badge-marked { background: #FFB800; }

.mark-btn { position: absolute; bottom: 5px; right: 5px; width: 26px; height: 26px; border-radius: 50%; border: none; background: rgba(0,0,0,.45); color: #fff; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; opacity: 0; }
.media-item:hover .mark-btn { opacity: 1; }
.mark-btn:hover { background: rgba(0,0,0,.7); transform: scale(1.1); }
.mark-btn.is-marked { background: #FFB800; opacity: 1; }

.pagination-bar { padding: 15px; text-align: center; border-top: 1px solid #eee; }
.pagination-bar .layui-laypage a, .pagination-bar .layui-laypage span { font-size: 12px; }

.backup-bar { padding: 10px 15px; border-top: 1px solid #eee; background: #fffbe6; display: flex; gap: 12px; align-items: center; }
.backup-bar .backup-stat { font-size: 13px; color: #666; }
.backup-bar .backup-stat b { color: #FF9800; }
.backup-list { padding: 10px 15px; max-height: 300px; overflow-y: auto; }
.backup-item { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
.backup-item:last-child { border-bottom: none; }
.backup-item img { width: 40px; height: 40px; object-fit: cover; border-radius: 4px; border: 1px solid #e6e6e6; }
.backup-item .bi-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: #f5f5f5; border-radius: 4px; border: 1px solid #e6e6e6; }
.backup-item .bi-icon i { font-size: 20px; color: #bbb; }
.backup-item .bi-info { flex: 1; min-width: 0; }
.backup-item .bi-name { font-size: 12px; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.backup-item .bi-meta { font-size: 11px; color: #999; }
.backup-item .bi-actions { display: flex; gap: 5px; }
</style>

<div class="layui-body">
  <div class="layui-tab layui-tab-brief" lay-filter="tab">
    <ul class="layui-tab-title">
      <li class="layui-this">媒體庫</li>
    </ul>
    <div class="layui-tab-content" style="padding:0;">

      <div class="media-toolbar">
        <span class="stat stat-total"><i class="fa fa-folder-open-o"></i> 總計 <b>{{ Total }}</b> 個</span>
        <span class="stat"><i class="fa fa-database"></i> 大小 <b>{{ TotalSize }}</b></span>
        <span class="stat stat-used"><i class="fa fa-link"></i> 已用 <b>{{ UsedCount }}</b></span>
        <span class="stat stat-unused"><i class="fa fa-unlink"></i> 未用 <b>{{ UnusedCount }}</b></span>
        <span class="stat stat-marked"><i class="fa fa-bookmark"></i> 已標記 <b>{{ MarkedCount }}</b></span>
        <span class="stat" style="color:#999;font-size:11px;"><i class="fa fa-clock-o"></i> {{ CacheTime }}</span>
        <span class="toolbar-right">
          <button class="layui-btn layui-btn-sm layui-btn-danger" id="btn-clean"><i class="fa fa-trash-o"></i> 清理未使用</button>
          <button class="layui-btn layui-btn-sm layui-btn-warm" id="btn-backup"><i class="fa fa-recycle"></i> 回收站</button>
          <button class="layui-btn layui-btn-sm layui-btn-normal" id="btn-refresh"><i class="fa fa-refresh"></i> 重新掃描</button>
        </span>
      </div>

      <div class="filter-bar">
        <button class="layui-btn layui-btn-sm layui-btn-primary filter-btn active" data-filter="all">全部</button>
        <button class="layui-btn layui-btn-sm layui-btn-primary filter-btn" data-filter="image">圖片</button>
        <button class="layui-btn layui-btn-sm layui-btn-primary filter-btn" data-filter="document">文檔</button>
        <button class="layui-btn layui-btn-sm layui-btn-primary filter-btn" data-filter="video">視頻</button>
        <button class="layui-btn layui-btn-sm layui-btn-primary filter-btn" data-filter="unused">僅未使用</button>
        <button class="layui-btn layui-btn-sm layui-btn-primary filter-btn" data-filter="marked">僅已標記</button>
        <input type="text" class="search-input" id="search-input" placeholder="搜索文件名...">
      </div>

      <div class="media-grid" id="media-grid"></div>
      <div class="pagination-bar" id="pagination-bar"></div>

    </div>
  </div>
</div>

{include file='common/foot.html'}

<script>
var _jq = window.jQuery;
layui.use(['layer'], function(){
    var layer = layui.layer;
    var $ = _jq;

    // ─── XSS 防護：HTML 轉義函數 ──────────────────────────
    function esc(s) {
        if (s == null) return '';
        return String(s).replace(/[&<>"']/g, function(c) {
            return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
        });
    }

    // ─── CSRF 輔助：取得 formcheck token ──────────────────
    function fc() { return $('#formcheck').val(); }

    var currentPage = 1;
    var currentFilter = 'all';
    var currentSearch = '';
    var pageSize = 40;

    // ─── Load page ───────────────────────────────────────
    function loadPage(page) {
        currentPage = page || 1;
        var $grid = $('#media-grid');
        $grid.addClass('loading');

        $.ajax({
            url: '/admin/content/media/list',
            type: 'GET',
            data: {
                page: currentPage,
                pagesize: pageSize,
                filter: currentFilter,
                search: currentSearch
            },
            dataType: 'json',
            headers: {
                'X-Requested-With': 'XMLHttpRequest'
            },
            success: function(res) {
                $grid.removeClass('loading');
                if (res.code !== 1) {
                    $grid.html('<div class="media-empty">載入失敗: ' + (res.msg || '') + '</div>');
                    return;
                }
                renderGrid(res.data.files);
                renderPagination(res.data.total, res.data.page, res.data.total_pages);
            },
            error: function() {
                $grid.removeClass('loading');
                $grid.html('<div class="media-empty">請求失敗</div>');
            }
        });
    }

    function renderGrid(files) {
        if (!files || files.length === 0) {
            $('#media-grid').html('<div class="media-empty"><i class="fa fa-inbox" style="font-size:48px;color:#ddd;"></i><br><br>暫無文件</div>');
            return;
        }
        var html = '';
        for (var i = 0; i < files.length; i++) {
            var f = files[i];
            var cls = 'media-item';
            var badge = '';
            if (f.marked) { cls += ' is-marked'; badge = '<span class="media-badge badge-marked">保護</span>'; }
            else if (f.used) { cls += ' is-used'; badge = '<span class="media-badge badge-used">已用</span>'; }
            else { cls += ' is-unused'; badge = '<span class="media-badge badge-unused">未用</span>'; }

            html += '<div class="' + cls + '" data-path="' + esc(f.path) + '">';
            html += '<div class="media-thumb">';
            if (f.category === 'image') {
                html += '<img src="/' + esc(f.path) + '" loading="lazy">';
            } else {
                html += '<i class="fa ' + getFileIcon(f.category) + ' file-icon"></i>';
            }
            html += badge;
            html += '</div>';
            html += '<div class="media-info">';
            html += '<div class="name" title="' + esc(f.name) + '">' + esc(f.name) + '</div>';
            html += '<div class="meta">' + esc(f.size_str) + '</div>';
            html += '</div>';
            html += '<button class="mark-btn' + (f.marked ? ' is-marked' : '') + '" title="' + (f.marked ? '取消保護' : '標記保護') + '"><i class="fa ' + (f.marked ? 'fa-bookmark' : 'fa-bookmark-o') + '"></i></button>';
            html += '</div>';
        }
        $('#media-grid').html(html);
    }

    function getFileIcon(cat) {
        switch(cat) {
            case 'document': return 'fa-file-text-o';
            case 'video': return 'fa-file-video-o';
            default: return 'fa-file-o';
        }
    }

    function renderPagination(total, page, totalPages) {
        if (totalPages <= 1) {
            $('#pagination-bar').html('<span class="layui-laypage-count">共 ' + total + ' 個</span>');
            return;
        }
        var html = '<div class="layui-laypage layui-laypage-main">';
        if (page > 1) {
            html += '<a href="javascript:;" data-page="' + (page - 1) + '">上一頁</a>';
        }
        var start = Math.max(1, page - 2);
        var end = Math.min(totalPages, page + 2);
        for (var i = start; i <= end; i++) {
            if (i === page) {
                html += '<span class="layui-laypage-curr">' + i + '</span>';
            } else {
                html += '<a href="javascript:;" data-page="' + i + '">' + i + '</a>';
            }
        }
        if (page < totalPages) {
            html += '<a href="javascript:;" data-page="' + (page + 1) + '">下一頁</a>';
        }
        html += '<span class="layui-laypage-count">共 ' + total + ' 個</span>';
        html += '</div>';
        $('#pagination-bar').html(html);
    }

    // ─── Events ───────────────────────────────────────────

    // Filter buttons
    $(document).on('click', '.filter-btn', function() {
        $('.filter-btn').removeClass('active');
        $(this).addClass('active');
        currentFilter = $(this).data('filter');
        loadPage(1);
    });

    // Pagination
    $(document).on('click', '#pagination-bar a[data-page]', function() {
        loadPage(parseInt($(this).data('page')));
    });

    // Search (debounce 300ms)
    var searchTimer;
    $('#search-input').on('input', function() {
        var val = $(this).val();
        clearTimeout(searchTimer);
        searchTimer = setTimeout(function() {
            currentSearch = val;
            loadPage(1);
        }, 300);
    });

    // Mark toggle
    $(document).on('click', '.mark-btn', function(e) {
        e.stopPropagation();
        var $item = $(this).closest('.media-item');
        var path = $item.data('path');
        var $btn = $(this);
        $btn.prop('disabled', true);

        $.ajax({
            url: '/admin/content/media/mark',
            type: 'POST',
            data: { path: path, formcheck: fc() },
            dataType: 'json',
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function(res) {
                layer.msg(res.msg, { icon: res.code ? 1 : 2, time: 800 });
                loadPage(currentPage);
            },
            complete: function() {
                $btn.prop('disabled', false);
            }
        });
    });

    // Image lightbox (double-click)
    $(document).on('dblclick', '.media-thumb img', function() {
        var src = $(this).attr('src');
        layer.photos({
            photos: { data: [{ src: src, alt: '' }] },
            anim: 5
        });
    });

    // Single-click: show file detail popup
    var detailClickTimer = null;
    $(document).on('click', '.media-item', function(e) {
        if ($(e.target).closest('.mark-btn').length) return;
        var $item = $(this);
        var path = $item.data('path');
        if (!path) return;

        if (detailClickTimer) { clearTimeout(detailClickTimer); detailClickTimer = null; return; }
        detailClickTimer = setTimeout(function() {
            detailClickTimer = null;
            showDetail(path);
        }, 250);
    });

    function showDetail(path) {
        var loadIdx = layer.load(2);
        $.ajax({
            url: '/admin/content/media/detail',
            type: 'GET',
            data: { path: path },
            dataType: 'json',
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function(res) {
                layer.close(loadIdx);
                if (!res.code) { layer.msg(res.msg, {icon: 2}); return; }
                var d = res.data;

                var html = '<div style="padding:15px 20px;">';
                html += '<table class="layui-table" lay-skin="line" style="margin:0;">';
                html += '<colgroup><col width="90"><col></colgroup>';
                html += '<tbody>';
                html += '<tr><td><i class="fa fa-file-o"></i> 文件名</td><td style="word-break:break-all;">' + esc(d.name) + '</td></tr>';
                html += '<tr><td><i class="fa fa-folder-o"></i> 路徑</td><td style="word-break:break-all;color:#999;">' + esc(d.path) + '</td></tr>';
                html += '<tr><td><i class="fa fa-database"></i> 大小</td><td>' + esc(d.size_str) + '</td></tr>';
                if (d.mime) {
                    html += '<tr><td><i class="fa fa-tag"></i> 類型</td><td>' + esc(d.mime) + '</td></tr>';
                }
                if (d.dimension) {
                    html += '<tr><td><i class="fa fa-arrows-alt"></i> 尺寸</td><td>' + esc(d.dimension) + '</td></tr>';
                }
                html += '<tr><td><i class="fa fa-clock-o"></i> 修改時間</td><td>' + esc(d.mod_time) + '</td></tr>';
                html += '</tbody></table>';

                html += '<div style="margin-top:15px;">';
                if (d.usages && d.usages.length > 0) {
                    html += '<div style="font-weight:bold;margin-bottom:8px;"><i class="fa fa-link"></i> 使用位置 (' + d.usages.length + ')</div>';
                    html += '<table class="layui-table" lay-skin="line" style="margin:0;">';
                    html += '<colgroup><col width="100"><col width="60"><col><col width="100"></colgroup>';
                    html += '<thead><tr><th>來源</th><th>ID</th><th>名稱</th><th>欄位</th></tr></thead>';
                    html += '<tbody>';
                    for (var i = 0; i < d.usages.length; i++) {
                        var u = d.usages[i];
                        html += '<tr><td>' + esc(u.table) + '</td><td>' + esc(u.id) + '</td><td>' + esc(u.name||'-') + '</td><td>' + esc(u.field) + '</td></tr>';
                    }
                    html += '</tbody></table>';
                } else {
                    html += '<div style="color:#999;padding:10px 0;"><i class="fa fa-unlink"></i> 未在數據庫中找到使用位置</div>';
                }
                html += '</div>';

                if (d.category === 'image') {
                    html += '<div style="margin-top:15px;text-align:center;">';
                    html += '<img src="/' + esc(d.path) + '" style="max-width:100%;max-height:300px;border:1px solid #eee;border-radius:4px;">';
                    html += '</div>';
                }

                html += '</div>';

                layer.open({
                    type: 1,
                    title: '<i class="fa fa-info-circle"></i> 文件詳情',
                    area: ['550px', '500px'],
                    content: html,
                    shadeClose: true
                });
            },
            error: function() {
                layer.close(loadIdx);
                layer.msg('請求失敗', {icon: 2});
            }
        });
    }

    // Clean unused
    $('#btn-clean').on('click', function() {
        layer.confirm(
            '確定要清理所有未使用且未標記的文件嗎？<br><br><span style="color:#5FB878"><i class="fa fa-info-circle"></i> 清理的文件將移至回收站，可隨時還原。</span>',
            { btn: ['確定清理', '取消'], title: '<i class="fa fa-trash-o"></i> 清理未使用文件', icon: 3 },
            function(index) {
                layer.close(index);
                $.ajax({
                    url: '/admin/content/media/clean',
                    type: 'POST',
                    data: { formcheck: fc() },
                    dataType: 'json',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    success: function(res) {
                        layer.msg(res.msg, { icon: res.code ? 1 : 2, time: 2000 });
                        setTimeout(function() { location.reload(); }, 1500);
                    }
                });
            }
        );
    });

    // Backup (recycle bin)
    $('#btn-backup').on('click', function() {
        var loadIdx = layer.load(2);
        $.ajax({
            url: '/admin/content/media/backup',
            type: 'GET',
            dataType: 'json',
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function(res) {
                layer.close(loadIdx);
                if (!res.code) { layer.msg(res.msg, {icon: 2}); return; }
                var d = res.data;
                var html = '<div style="padding:15px;">';

                html += '<div class="backup-bar" style="margin-bottom:10px;border:1px solid #eee;border-radius:4px;">';
                html += '<span class="backup-stat"><i class="fa fa-recycle"></i> 回收站共 <b>' + d.total + '</b> 個文件，<b>' + d.total_size + '</b></span>';
                if (d.total > 0) {
                    html += '<button class="layui-btn layui-btn-sm layui-btn-danger" id="btn-backup-clear" style="margin-left:auto;"><i class="fa fa-times"></i> 清空回收站</button>';
                }
                html += '</div>';

                if (d.total === 0) {
                    html += '<div style="text-align:center;padding:40px 0;color:#999;"><i class="fa fa-inbox" style="font-size:36px;"></i><br><br>回收站為空</div>';
                } else {
                    html += '<div class="backup-list">';
                    for (var i = 0; i < d.files.length; i++) {
                        var f = d.files[i];
                        var ext = f.name.split('.').pop().toLowerCase();
                        var isImg = ['jpg','jpeg','png','gif','bmp','webp','avif','svg','ico'].indexOf(ext) >= 0;
                        html += '<div class="backup-item">';
                        if (isImg) {
                            html += '<img src="/static/backup/media/' + esc(f.path) + '">';
                        } else {
                            html += '<div class="bi-icon"><i class="fa fa-file-o"></i></div>';
                        }
                        html += '<div class="bi-info">';
                        html += '<div class="bi-name" title="' + esc(f.name) + '">' + esc(f.name) + '</div>';
                        html += '<div class="bi-meta">' + esc(f.size_str) + ' · ' + esc(f.mod_time) + '</div>';
                        html += '</div>';
                        html += '<div class="bi-actions">';
                        html += '<button class="layui-btn layui-btn-xs layui-btn-normal btn-restore" data-path="' + esc(f.path) + '"><i class="fa fa-undo"></i> 還原</button>';
                        html += '</div>';
                        html += '</div>';
                    }
                    html += '</div>';
                }

                html += '</div>';

                layer.open({
                    type: 1,
                    title: '<i class="fa fa-recycle"></i> 回收站',
                    area: ['600px', '500px'],
                    content: html,
                    shadeClose: true
                });
            },
            error: function() {
                layer.close(loadIdx);
                layer.msg('請求失敗', {icon: 2});
            }
        });
    });

    // Restore file
    $(document).on('click', '.btn-restore', function() {
        var path = $(this).data('path');
        var $btn = $(this);
        $btn.prop('disabled', true);
        $.ajax({
            url: '/admin/content/media/restore',
            type: 'POST',
            data: { path: path, formcheck: fc() },
            dataType: 'json',
            headers: { 'X-Requested-With': 'XMLHttpRequest' },
            success: function(res) {
                layer.msg(res.msg, { icon: res.code ? 1 : 2, time: 1500 });
                if (res.code) {
                    $btn.closest('.backup-item').fadeOut(300, function(){ $(this).remove(); });
                }
            },
            complete: function() { $btn.prop('disabled', false); }
        });
    });

    // Clear backup
    $(document).on('click', '#btn-backup-clear', function() {
        layer.confirm(
            '確定要永久刪除回收站中的所有文件嗎？<br><span style="color:#FF5722">此操作不可恢復！</span>',
            { btn: ['確定清空', '取消'], title: '清空回收站', icon: 3 },
            function(index) {
                layer.close(index);
                $.ajax({
                    url: '/admin/content/media/backupClear',
                    type: 'POST',
                    data: { formcheck: fc() },
                    dataType: 'json',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    success: function(res) {
                        layer.msg(res.msg, { icon: res.code ? 1 : 2, time: 2000 });
                        setTimeout(function() { location.reload(); }, 1500);
                    }
                });
            }
        );
    });

    // Refresh
    $('#btn-refresh').on('click', function() {
        layer.confirm(
            '<i class="fa fa-exclamation-triangle" style="color:#FF9800;font-size:18px;"></i> 重新掃描所有文件？<br><br><span style="color:#999;font-size:12px;">將遍歷文件目錄和數據庫，預計耗時 10~50 秒<br>掃描期間頁面數據不會更新</span>',
            { btn: ['開始掃描', '取消'], title: '<i class="fa fa-refresh"></i> 刷新媒體庫', icon: 0 },
            function(idx) {
                layer.close(idx);
                var loadIdx = layer.load(2, { shade: [0.3, '#000'] });
                $.ajax({
                    url: '/admin/content/media/refresh',
                    type: 'POST',
                    data: { formcheck: fc() },
                    dataType: 'json',
                    headers: { 'X-Requested-With': 'XMLHttpRequest' },
                    success: function(res) {
                        layer.close(loadIdx);
                        if (res.code) {
                            layer.msg('<i class="fa fa-check"></i> ' + res.msg, { icon: 1, time: 2000 });
                            setTimeout(function() { location.reload(); }, 1500);
                        } else {
                            layer.msg('<i class="fa fa-times"></i> ' + res.msg, { icon: 2, time: 3000 });
                        }
                    },
                    error: function() {
                        layer.close(loadIdx);
                        layer.msg('請求失敗', { icon: 2 });
                    }
                });
            }
        );
    });

    // ─── Init ─────────────────────────────────────────────
    loadPage(1);
});
</script>
