<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{content:title} - {gboot:sitetitle}</title>
    <meta name="keywords" content="{content:keywords}">
    <meta name="description" content="{content:description}">
</head>
<body>
    {include file=head.html}

    <div class="breadcrumb">{gboot:position separator=/}</div>

    <article class="content-detail">
        <h1 {gboot:if('{content:titlecolor}'!='')}style="color: {content:titlecolor};"{/gboot:if}>{content:title}</h1>
        <div class="meta">
            <span>作者：{content:author}</span>
            <span>時間：{content:date style=Y-m-d}</span>
            <span>瀏覽：{content:visits}</span>
        </div>
        <div class="content-body">
            {content:content}
        </div>
    </article>

    {include file=foot.html}
