{include file=comm/head.html}

{include file=comm/top.html}

<div class="container pages">

	{include file=comm/position.html}

    <!-- 會員找回密碼 -->
    <div class="row">
    	<div class="col-lg-3"></div>
    	<div class="col-12 col-lg-6">
        	<form class="my-4" onsubmit="return retrieve(this);">
                <div class="form-group">
                    <label for="username">帳　號</label>
                    <input type="text" name="username" required id="username" class="form-control" placeholder="請輸入已註冊帳號">
                </div>

                <div class="form-group">
                    <label for="email">郵　箱</label>
                    <input type="text" name="email" required id="email" class="form-control" placeholder="請輸入已註冊郵箱">
                    <div id="emailnote"></div>
                </div>

                <div class="form-group">
                    <label for="checkcode">郵箱驗證碼</label>
                    <div class="row">
                        <div class="col-6">
                            <input type="text" name="checkcode" required id="checkcode" class="form-control" placeholder="請輸入驗證碼">
                        </div>
                        <div class="col-6">
                            <button type="button" class="btn btn-info mb-2" id="sendcode" onclick="sendEmail()">發送</button>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">新密碼</label>
                    <div class="row">
                        <div class="col-6">
                            <input type="password" name="password" required id="password" class="form-control" placeholder="請輸入新的密碼">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                   <button type="submit" class="btn btn-info mb-2">確認重置</button>
				   <span class="text-secondary ml-3"><a href="{gboot:login}">返回登錄</a></span>
                </div>
            </form>
        </div>
        <div class="col-lg-3"></div>
    </div>
</div>

<script>
// 找回密碼
function retrieve(obj){
  var url = '/retrieve';
  var username = $(obj).find("#username").val();
  var email = $(obj).find("#email").val();
  var checkcode = $(obj).find("#checkcode").val();
  var password = $(obj).find("#password").val();

  $.ajax({
    type: 'POST',
    url: url,
    dataType: 'json',
    data: {
      username: username,
      email: email,
      checkcode: checkcode,
      password: password
    },
    success: function (response) {
      if(response.code){
        alert("密碼設置成功！");
        location.href = response.tourl;
      } else {
        alert(response.data || response.msg);
      }
    },
    error:function(){
      alert('返回數據異常！');
    }
  });
  return false;
}

// 發送郵箱驗證碼
function sendEmail(){
  var email = $("#email").val();
  if(!email){
    $("#emailnote").text("請輸入註冊郵箱！");
    return false;
  }
  var btn = $("#sendcode");
  btn.attr("disabled", true);
  btn.text("發送中...");

  $.ajax({
    type: 'POST',
    url: '/member/sendemail',
    dataType: 'json',
    data: {
      retrieve: 1,
      to: email
    },
    success: function(response){
      if(response.code){
        alert(response.data);
        var count = 60;
        var timer = setInterval(function(){
          count--;
          btn.text(count + "秒後可重發");
          if(count <= 0){
            clearInterval(timer);
            btn.attr("disabled", false);
            btn.text("發送");
          }
        }, 1000);
      } else {
        alert(response.data || response.msg);
        btn.attr("disabled", false);
        btn.text("發送");
      }
    },
    error: function(){
      alert("返回數據異常！");
      btn.attr("disabled", false);
      btn.text("發送");
    }
  });
  return false;
}
</script>
