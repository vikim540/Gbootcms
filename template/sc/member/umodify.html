{include file=comm/head.html}

{include file=comm/top.html}

<div class="container pages">

	{include file=comm/position.html}

	<div class="row mb-5">

		{include file=member/left.html}

        <div class="col-12 col-md-10 mt-3">
        		<form onsubmit="return umodify(this);">

	        		<div class="form-group">
	                    <label for="username">用户名：</label>
	                    <div>
	                        {user:username}
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="headpic">头像：</label>
		               	<input type="text" name="headpic" id="headpic" value="{user:headpic}" class="form-control" placeholder="请输入头像图片地址">
		               	<div style="height:100px; width:100px; border:1px solid #ccc; margin-top:5px; border-radius:2px">
		               		<img src="{user:headpic}" id="headpic_preview" style="max-width:100%;max-height:100%">
		               	</div>
	                </div>

	                <div class="form-group">
	                    <label for="useremail">邮箱：</label>
	                    <div>
	                        <input type="text" name="useremail" value="{user:useremail}" autocomplete="off" class="form-control" placeholder="请输入邮箱账号">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="usermobile">手机：</label>
	                    <div>
	                        <input type="text" name="usermobile" value="{user:usermobile}" autocomplete="off" class="form-control" placeholder="请输入手机号码">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="nickname">昵称：</label>
	                    <div>
	                        <input type="text" name="nickname" value="{user:nickname}" autocomplete="off" class="form-control" placeholder="请输入账号昵称">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="password">新密码：</label>
	                    <div>
	                        <input type="password" name="password" class="form-control" autocomplete="off" placeholder="不修改请留空">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="rpassword">确认密码：</label>
	                    <div>
	                        <input type="password" name="rpassword" class="form-control" autocomplete="off" placeholder="请再次输入新登录密码">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="sex">性别：</label>
	                    <div>
	                         <select class="form-control" name="sex" id="sex">
							  <option value="男" {gboot:if('{user:sex}'=='男')}selected{/gboot:if}>男</option>
							  <option value="女" {gboot:if('{user:sex}'=='女')}selected{/gboot:if}>女</option>
							</select>
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="birthday">生日：</label>
                        <div>
	                        <input class="form-control" type="date" name="birthday" id="birthday" value="{user:birthday}">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="telephone">电话：</label>
	                    <div>
	                        <input type="text" name="telephone" value="{user:telephone}" autocomplete="off" class="form-control" placeholder="请输入电话号码">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="qq">QQ：</label>
	                    <div>
	                        <input type="text" name="qq" value="{user:qq}" autocomplete="off" class="form-control" placeholder="请输入QQ号码">
	                    </div>
	                </div>

	                <div class="form-group">
	                    <label for="opassword">当前密码：<span class="text-danger">*</span></label>
	                    <div>
	                        <input type="password" name="opassword" required autocomplete="off" class="form-control" placeholder="请输入当前密码">
	                    </div>
	                </div>

	                <div class="form-group">
	                   <button type="submit" class="btn btn-info">保存</button>
	                   <a href="{gboot:ucenter}" class="btn btn-light">返回</a>
	               </div>
               </form>
        </div>
   </div>

</div>

<script>

//ajax修改資料
function umodify(obj){
  var url='{gboot:umodify}';
  var data = $(obj).serialize();

  $.ajax({
    type: 'POST',
    url: url,
    dataType: 'json',
    data: data,
    success: function (response, status) {
      if(response.code){
    	 alert(response.msg);
		 location.href= response.tourl;
      }else{
    	 alert(response.data || response.msg);
      }
    },
    error:function(xhr,status,error){
      alert('返回数据异常！');
    }
  });
  return false;
}

//頭像預覽
$(document).ready(function(){
	$('#headpic').on('input', function(){
		$('#headpic_preview').attr('src', $(this).val());
	});
});
</script>

{include file=comm/foot.html}
