<!-- 引入编辑器文件 -->
<script type="text/javascript" charset="utf-8" src="{APP_THEME_DIR}/extend/ueditor/ueditor.config.js"></script>
<script type="text/javascript" charset="utf-8" src="{APP_THEME_DIR}/extend/ueditor/ueditor.all.js"> </script>
<script type="text/javascript" charset="utf-8" src="{APP_THEME_DIR}/extend/ueditor/lang/zh-cn/zh-cn.js"></script>
<!-- Vditor Markdown 编辑器 -->
<link rel="stylesheet" href="{APP_THEME_DIR}/extend/vditor/index.css" />
<script src="{APP_THEME_DIR}/extend/vditor/index.min.js"></script>

<style>
.md-toggle-bar { margin-bottom: 8px; display: flex; gap: 5px; align-items: center; }
.md-toggle-bar .mode-btn { padding: 5px 16px; border: 1px solid #ddd; background: #fff; border-radius: 3px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
.md-toggle-bar .mode-btn:hover { border-color: #1E9FFF; color: #1E9FFF; }
.md-toggle-bar .mode-btn.active { background: #1E9FFF; color: #fff; border-color: #1E9FFF; }
.md-toggle-bar .mode-btn i { margin-right: 4px; }
#vditorWrap { display: none; }
#vditorWrap .vditor { border: 1px solid #e6e6e6; border-radius: 4px; }
</style>

<script>
var mdMode = false;
var vditorInstance = null;
var ueInstance = null;

function getUE() {
    if (!ueInstance) {
        try { ueInstance = UE.getEditor('editor'); } catch(e) {}
    }
    return ueInstance;
}

function switchToRich() {
    if (!mdMode) return;
    mdMode = false;

    document.getElementById('mdBtnMD').classList.remove('active');
    document.getElementById('mdBtnRich').classList.add('active');

    // Get HTML from Vditor and set into UEditor
    if (vditorInstance) {
        var html = vditorInstance.getHTML();
        var ue = getUE();
        if (ue) {
            try { ue.setContent(html); } catch(e) {}
        }
    }

    // Toggle visibility
    document.getElementById('vditorWrap').style.display = 'none';
    var editorParent = document.getElementById('editor').parentNode;
    var eduiEditor = editorParent.querySelector('.edui-editor');
    if (eduiEditor) eduiEditor.style.display = '';
}

function switchToMD() {
    if (mdMode) return;
    mdMode = true;

    document.getElementById('mdBtnRich').classList.remove('active');
    document.getElementById('mdBtnMD').classList.add('active');

    // Get HTML from UEditor
    var html = '';
    var ue = getUE();
    if (ue) {
        try { html = ue.getContent(); } catch(e) {}
    }

    // Toggle visibility
    var editorParent = document.getElementById('editor').parentNode;
    var eduiEditor = editorParent.querySelector('.edui-editor');
    if (eduiEditor) eduiEditor.style.display = 'none';

    var vditorWrap = document.getElementById('vditorWrap');
    vditorWrap.style.display = 'block';

    // Initialize Vditor (or reinitialize with content)
    if (!vditorInstance) {
        vditorInstance = new Vditor('vditorContainer', {
            height: 500,
            mode: 'ir', // Instant Rendering mode
            theme: 'classic',
            preview: {
                theme: { current: 'light' },
                markdown: {
                    toc: true,
                    mark: true,
                    footnotes: true,
                },
                math: {
                    engine: 'KaTeX',
                },
            },
            toolbar: [
                'emoji', 'headings', 'bold', 'italic', 'strike', '|',
                'line', 'quote', 'list', 'ordered-list', 'check', 'outdent', 'indent', '|',
                'code', 'inline-code', 'table', '|',
                'link', 'upload', '|',
                'undo', 'redo', '|',
                'edit-mode', 'fullscreen', 'preview', 'outline', '|',
                {
                    name: 'back-to-rich',
                    tipPosition: 's',
                    tip: '切回富文本',
                    className: 'back-to-rich-btn',
                    click: function() { switchToRich(); }
                }
            ],
            toolbarConfig: {
                pin: true,
            },
            counter: {
                enable: true,
                type: 'text',
            },
            typewriterMode: true,
            value: '',
            cache: { enable: false },
            after: function() {
                // Set content after Vditor is ready
                if (html && html.trim()) {
                    vditorInstance.setValue(html);
                }
            },
            upload: {
                url: '/admin/index/upload',
                fieldName: 'file',
                format: function(files, responseText) {
                    var res = JSON.parse(responseText);
                    if (res.code == 1 && res.data && res.data.length > 0) {
                        var succMap = {};
                        for (var i = 0; i < res.data.length; i++) {
                            var path = res.data[i];
                            var name = path.split('/').pop();
                            succMap[name] = path;
                        }
                        return JSON.stringify({ msg: '', code: 0, data: { errFiles: [], succMap: succMap } });
                    }
                    return JSON.stringify({ msg: 'Upload failed', code: -1, data: { errFiles: files.map(function(f){return f.name}), succMap: {} } });
                },
            },
        });
    } else {
        if (html && html.trim()) {
            vditorInstance.setValue(html);
        }
    }
}

// Initialize
$(document).ready(function () {
    var ue = UE.getEditor('editor', {
        maximumWords: 30000
    });

    // Inject toggle bar
    var editorEl = document.getElementById('editor');
    if (editorEl) {
        var parent = editorEl.parentNode;
        var bar = document.createElement('div');
        bar.className = 'md-toggle-bar';
        bar.innerHTML = '<button type="button" id="mdBtnRich" class="mode-btn active" onclick="switchToRich()"><i class="fa fa-font"></i> 富文本模式</button>' +
            '<button type="button" id="mdBtnMD" class="mode-btn" onclick="switchToMD()"><i class="fa fa-code"></i> Markdown 模式</button>';
        parent.insertBefore(bar, parent.firstChild);

        // Create Vditor container
        var wrap = document.createElement('div');
        wrap.id = 'vditorWrap';
        wrap.innerHTML = '<div id="vditorContainer"></div>';
        parent.insertBefore(wrap, bar.nextSibling);
    }
});
</script>

<script type="text/javascript">
   <!-- 解决源码模式无法保存 -->
  function editor_init() {
      $('#edit').submit(function () {
          if (mdMode && vditorInstance) {
              // MD mode: convert to HTML and set
              var html = vditorInstance.getHTML();
              var ue = getUE();
              if (ue) {
                  try { ue.setContent(html); } catch(e) {}
              }
              // Also set the hidden textarea value
              var ta = document.getElementById('editor');
              if (ta) ta.value = html;
          } else {
              var editor = getUE();
              if (editor && editor.queryCommandState('source')==1) editor.execCommand('source');
          }
      })
  }

  <!-- 点击后添加到编辑器 -->
  $(".addedit").on("click",'img',function(){
      var img = $(this).attr("src");
      if (mdMode && vditorInstance) {
          vditorInstance.insertValue('![](' + img + ')');
      } else {
          var editor = getUE();
          if (editor) editor.execCommand('inserthtml', "<img src='" + img + "'>");
      }
   });

</script>

<script type="text/javascript">editor_init();</script>
